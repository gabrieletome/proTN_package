# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, r_check_dependecies]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
       matrix:
        config:
          - {os: ubuntu-latest, r: '4.3.3'}
          - {os: windows-latest, r: '4.3.3'}
    
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      
      - name: Cache R packages
        if: runner.os != 'Windows'
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-${{ hashFiles('.github/depends.Rds') }}
          restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-
        
      - name: install latex
        if: runner.os == 'Linux'
        run: sudo apt-get install texlive-latex-base libcurl4-openssl-dev
       
      - name: check R
        if: runner.os == 'Linux'
        run: |
          R --version
          
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          
      - name: Query dependencies
        run: |
          install.packages(c('remotes', 'BiocManager'), INSTALL_opts="--no-multiarch")
          options(repos = c(getOption("repos"), BiocManager::repositories()))
          saveRDS(remotes::dev_package_deps(dependencies = TRUE), "depends.Rds", version = 2)          
        shell: Rscript {0}
          
      - name: Install dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck","pandoc", "rlang", "vctrs", "processx", "rmarkdown"), INSTALL_opts="--no-multiarch")
          remotes::install_github("symbioticMe/proBatch")
          remotes::install_github("PYangLab/PhosR")
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}
          
      - name: Check
        run: rcmdcheck::rcmdcheck(args = c("--no-manual", "--no-multiarch"), error_on = "error")
        shell: Rscript {0}